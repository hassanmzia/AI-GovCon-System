upstream django_api {
    server django-api:8001;
}

upstream node_realtime {
    server node-realtime:8002;
}

upstream ai_orchestrator {
    server ai-orchestrator:8003;
}

upstream frontend {
    server frontend:3027;
}

upstream langfuse {
    server langfuse:8004;
}

# Extended log format: includes upstream timing and status for easier debugging.
# Fields:
#   rt  = total request processing time (seconds)
#   uct = upstream connect time
#   uht = upstream header time
#   urt = upstream response time
#   us  = upstream HTTP status
#   ua  = upstream address actually used
log_format main_ext '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'us="$upstream_status" ua="$upstream_addr"';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log main_ext;
    error_log  /var/log/nginx/error.log warn;

    client_max_body_size 100M;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django API — long-running AI agent endpoints (up to 3 minutes)
    location ~ ^/api/deals/deals/[^/]+/run- {
        proxy_pass http://django_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # Django API
    location /api/ {
        proxy_pass http://django_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Admin (moved to /django-admin/ so /admin/* routes reach Next.js)
    location /django-admin/ {
        proxy_pass http://django_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static files
    location /static/ {
        proxy_pass http://django_api;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User-uploaded media files served directly from disk — no Django round-trip.
    # The ./backend/media directory is mounted into NGINX at /usr/share/nginx/media
    # via docker-compose, so files are available immediately after upload.
    location /media/ {
        alias /usr/share/nginx/media/;
        add_header Cache-Control "public, max-age=3600";
    }

    # WebSocket (realtime)
    location /ws/ {
        proxy_pass http://node_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # AI Orchestrator
    location /ai/ {
        proxy_pass http://ai_orchestrator;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # AI Orchestrator SSE (streaming)
    location /ai/stream/ {
        proxy_pass http://ai_orchestrator;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300;
    }

    # Langfuse
    location /langfuse/ {
        proxy_pass http://langfuse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
